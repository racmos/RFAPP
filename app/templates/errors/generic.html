{% extends "base.html" %}

{% block title %}{{ error.name }} - Error{% endblock %}

{% block content %}
<div class="error-container">
    <h1>{{ error.code }}</h1>
    <h2>{{ error.name }}</h2>
    <p>{{ error.description }}</p>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">Volver al Inicio</a>
</div>
{% endblock %}
